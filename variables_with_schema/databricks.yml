bundle:
  name: variables_with_schema

include:
  - ./resources/*.yml

workspace:
  host: https://one-env-hurcy.cloud.databricks.com
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

variables:
  name_prefix: 
    description: prefix for schema per target mode
    default: ''
    

targets:
  dev:
    presets:
      pipelines_development: true
      name_prefix: "[${workspace.current_user.short_name}]" # development mode 대상의 이름 고유성을 보ㅇㅏ기 위해 접두사 제거가 안됨.
    default: true
    mode: development

  stg:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prd:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
