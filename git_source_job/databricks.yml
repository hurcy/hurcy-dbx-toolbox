bundle:
  name: git_source_job

include:
  - ./resources/*.yml

workspace:
  host: https://one-env-hurcy.cloud.databricks.com
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

variables:
  name_prefix: 
    description: prefix per target mode
    default: '' 
  source:
    description: source
    default: GIT
  git_url:
    description: source
    default: https://github.com/hurcy/test_cicd_01.git
  git_provider:
    description: source
    default: gitHub
  git_branch:
    description: source
    default: main

targets:
  dev:
    default: true
    mode: development
  prd:
    mode: production

